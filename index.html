    async function generateInvoicePDF(id) {
        try {
            showLoading();
            const doc = await userRef('invoices').doc(id).get();
            if (!doc.exists()) { hideLoading(); showToast('Invoice not found.', 'error'); return; }
            const inv = doc.data();
            const biz = APP.settings || {};
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF({ unit: 'mm', format: 'a4' });
            const pw = pdf.internal.pageSize.getWidth();
            const margin = 20;
            let y = 20;

            // ─── Logo ───
            if (biz.logoUrl) {
                try {
                    const img = new Image();
                    img.crossOrigin = 'anonymous';
                    await new Promise((resolve, reject) => {
                        img.onload = resolve;
                        img.onerror = reject;
                        img.src = biz.logoUrl;
                    });
                    const canvas = document.createElement('canvas');
                    canvas.width = img.naturalWidth;
                    canvas.height = img.naturalHeight;
                    canvas.getContext('2d').drawImage(img, 0, 0);
                    const logoData = canvas.toDataURL('image/png');
                    const logoH = 18;
                    const logoW = (img.naturalWidth / img.naturalHeight) * logoH;
                    pdf.addImage(logoData, 'PNG', (pw - logoW) / 2, y, logoW, logoH);
                    y += logoH + 4;
                } catch { /* skip logo if CORS fails */ }
            }

            // ─── Business Header ───
            pdf.setFontSize(18);
            pdf.setFont('helvetica', 'bold');
            pdf.setTextColor(37, 99, 235); // brand blue
            pdf.text(biz.businessName || 'Mobile Service OS', pw / 2, y, { align: 'center' });
            y += 7;
            pdf.setFontSize(9);
            pdf.setFont('helvetica', 'normal');
            pdf.setTextColor(100, 100, 100);
            const contactParts = [biz.phone, biz.email, biz.address].filter(Boolean);
            if (contactParts.length) {
                pdf.text(contactParts.join('  ·  '), pw / 2, y, { align: 'center' });
                y += 5;
            }

            // ─── Divider ───
            y += 3;
            pdf.setDrawColor(37, 99, 235);
            pdf.setLineWidth(0.8);
            pdf.line(margin, y, pw - margin, y);
            y += 8;

            // ─── Invoice Title & Details ───
            pdf.setFontSize(14);
            pdf.setFont('helvetica', 'bold');
            pdf.setTextColor(30, 30, 30);
            pdf.text('INVOICE', margin, y);
            pdf.setFontSize(10);
            pdf.setFont('helvetica', 'normal');
            pdf.setTextColor(80, 80, 80);
            pdf.text('#' + (inv.invoiceNumber || ''), margin + 28, y);

            // Status badge
            const statusText = (inv.status || 'unpaid').toUpperCase();
            const statusColor = inv.status === 'paid' ? [34, 197, 94] : [245, 158, 11];
            pdf.setFillColor(...statusColor);
            const stW = pdf.getTextWidth(statusText) + 8;
            pdf.roundedRect(pw - margin - stW, y - 5, stW, 7, 2, 2, 'F');
            pdf.setFontSize(8);
            pdf.setFont('helvetica', 'bold');
            pdf.setTextColor(255, 255, 255);
            pdf.text(statusText, pw - margin - stW + 4, y - 0.5);
            y += 8;

            // Date
            pdf.setFontSize(9);
            pdf.setFont('helvetica', 'normal');
            pdf.setTextColor(100, 100, 100);
            pdf.text('Date: ' + formatDate(inv.createdAt), margin, y);
            y += 10;

            // ─── Bill To ───
            pdf.setFontSize(10);
            pdf.setFont('helvetica', 'bold');
            pdf.setTextColor(37, 99, 235);
            pdf.text('BILL TO', margin, y);
            y += 6;
            pdf.setFont('helvetica', 'normal');
            pdf.setTextColor(30, 30, 30);
            pdf.setFontSize(11);
            pdf.text(inv.customerName || '—', margin, y);
            y += 5;
            if (inv.customerPhone) {
                pdf.setFontSize(9);
                pdf.setTextColor(80, 80, 80);
                pdf.text(inv.customerPhone, margin, y);
                y += 5;
            }
            y += 6;

            // ─── Line Items Table ───
            const tableX = margin;
            const colW = [pw - 2 * margin - 45, 45]; // description, amount
            // Header row
            pdf.setFillColor(37, 99, 235);
            pdf.rect(tableX, y, colW[0] + colW[1], 8, 'F');
            pdf.setFontSize(9);
            pdf.setFont('helvetica', 'bold');
            pdf.setTextColor(255, 255, 255);
            pdf.text('Description', tableX + 4, y + 5.5);
            pdf.text('Amount', tableX + colW[0] + colW[1] - 4, y + 5.5, { align: 'right' });
            y += 8;

            // Item rows
            pdf.setTextColor(30, 30, 30);
            pdf.setFont('helvetica', 'normal');
            const items = [];
            if (inv.serviceType) items.push({ desc: inv.serviceType, amt: null });
            if (inv.location) items.push({ desc: 'Location: ' + inv.location, amt: null });
            if (inv.tireSize) items.push({ desc: 'Tire: ' + inv.tireSize, amt: null });
            if (inv.materialCost > 0) items.push({ desc: 'Materials / Parts', amt: money(inv.materialCost) });

            // If no line items, just show the service as one line
            if (items.length === 0) items.push({ desc: 'Service', amt: null });

            items.forEach((item, i) => {
                const fill = i % 2 === 0;
                if (fill) { pdf.setFillColor(245, 247, 250); pdf.rect(tableX, y, colW[0] + colW[1], 7, 'F'); }
                pdf.setFontSize(9);
                pdf.text(item.desc, tableX + 4, y + 5);
                if (item.amt) pdf.text(item.amt, tableX + colW[0] + colW[1] - 4, y + 5, { align: 'right' });
                y += 7;
            });

            // Total row
            y += 2;
            pdf.setDrawColor(200, 200, 200);
            pdf.line(tableX + colW[0] - 20, y, tableX + colW[0] + colW[1], y);
            y += 6;
            pdf.setFontSize(12);
            pdf.setFont('helvetica', 'bold');
            pdf.setTextColor(30, 30, 30);
            pdf.text('Total Due:', tableX + colW[0] - 20, y);
            pdf.setTextColor(34, 197, 94);
            pdf.text(money(inv.amount), tableX + colW[0] + colW[1] - 4, y, { align: 'right' });
            y += 12;

            // ─── Notes ───
            if (inv.notes) {
                pdf.setFontSize(9);
                pdf.setFont('helvetica', 'italic');
                pdf.setTextColor(100, 100, 100);
                pdf.text('Notes: ' + inv.notes, margin, y, { maxWidth: pw - 2 * margin });
                y += 10;
            }

            // ─── Footer ───
            const footerY = pdf.internal.pageSize.getHeight() - 15;
            pdf.setDrawColor(200, 200, 200);
            pdf.line(margin, footerY - 5, pw - margin, footerY - 5);
            pdf.setFontSize(8);
            pdf.setFont('helvetica', 'normal');
            pdf.setTextColor(140, 140, 140);
            pdf.text(biz.invoiceFooter || 'Thank you for your business!', pw / 2, footerY, { align: 'center' });

            // ─── Save / Download ───
            const fileName = `Invoice_${inv.invoiceNumber || 'draft'}.pdf`;
            pdf.save(fileName);
            hideLoading();
            showToast('Invoice PDF downloaded!', 'success');
        } catch (err) {
            hideLoading();
            console.error('PDF generation error:', err);
            showToast('Error generating PDF. Make sure you have internet connection.', 'error');
        }
    }

                <button class="tab" data-tab="services">Services</button>
                <button class="tab" data-tab="other">Other</button>
            </div>

            <!-- Business Tab -->
            <div class="tab-content active" id="tab-business">
                <div class="card">
                    <h3 style="margin-bottom:16px;">Business Profile</h3>
                    <div class="form-group"><label>Business Name</label><input type="text" id="sBizName" value="${escHtml(s.businessName || '')}"></div>
                    <div class="form-row" style="grid-template-columns:1fr 1fr;">
                        <div class="form-group"><label>Phone</label><input type="tel" id="sBizPhone" value="${escHtml(s.phone || '')}"></div>
                        <div class="form-group"><label>Email</label><input type="email" id="sBizEmail" value="${escHtml(s.email || '')}"></div>
                    </div>
                    <div class="form-group"><label>Base Location</label><input type="text" id="sBizBase" value="${escHtml(s.baseLocation || '')}"></div>
                    <div class="form-group">
                        <label>Logo</label>
                        ${s.logoUrl ? `<div style="margin-bottom:8px;"><img src="${escHtml(s.logoUrl)}" alt="Logo" style="max-height:60px;border-radius:8px;border:1px solid var(--border);"></div>` : ''}
                        <div style="display:flex;gap:8px;align-items:center;">
                            <input type="file" id="logoFileInput" accept="image/*" style="display:none;">
                            <button type="button" class="btn btn-secondary btn-sm" onclick="document.getElementById('logoFileInput').click()"><span class="material-icons">upload</span> Upload Logo</button>
                            <span id="logoUploadStatus" style="font-size:0.8rem;color:var(--text-tertiary);"></span>
                        </div>
                        <input type="hidden" id="sBizLogo" value="${escHtml(s.logoUrl || '')}">
                    </div>
                    <div class="form-group"><label>Website</label><input type="url" id="sBizWeb" value="${escHtml(s.websiteLink || '')}"></div>
                    <div class="form-group"><label>Business Type</label>
                        <select id="sBizType">
                            ${Object.entries(BUSINESS_TYPES).map(([key, bt]) =>
                                `<option value="${key}" ${s.businessType === key ? 'selected' : ''}>${bt.label}</option>`
                            ).join('')}
                        </select>
                    </div>
                </div>
                <div class="card" style="margin-top:16px;">
                    <h3 style="margin-bottom:16px;">Branding</h3>
                    <div class="form-row" style="grid-template-columns:1fr 1fr;">
                        <div class="form-group"><label>Primary Color</label><input type="color" id="sPrimary" value="${s.primaryColor || '#6c5ce7'}" style="height:48px;"></div>
                        <div class="form-group"><label>Accent Color</label><input type="color" id="sAccent" value="${s.accentColor || '#00cec9'}" style="height:48px;"></div>
                    </div>
                </div>
                <div class="card" style="margin-top:16px;">
                    <h3 style="margin-bottom:16px;">Invoice Settings</h3>
                    <div class="form-group"><label>Invoice Footer</label><input type="text" id="sInvFooter" value="${escHtml(s.invoiceFooter || '')}"></div>
                    <div class="form-group"><label>Review Link</label><input type="url" id="sReview" value="${escHtml(s.reviewLink || '')}" placeholder="https://g.page/..."></div>
                </div>
            </div>

            <!-- Pricing Tab -->
            <div class="tab-content" id="tab-pricing">
                <div class="card">
                    <h3 style="margin-bottom:16px;">Mileage & Travel</h3>
                    <div class="form-row" style="grid-template-columns:1fr 1fr;">
                        <div class="form-group"><label>Free Miles</label><input type="number" id="sFreeMiles" value="${s.freeMiles || 10}" min="0"></div>
                        <div class="form-group"><label>Per Mile Rate ($)</label><input type="number" id="sPerMile" value="${s.perMileRate || 3}" step="0.50" min="0"></div>
                    </div>
                </div>
                <div class="card" style="margin-top:16px;">
                    <h3 style="margin-bottom:16px;">Vehicle Multipliers</h3>
                    <div class="form-row" style="grid-template-columns:1fr 1fr;">
                        <div class="form-group"><label>Standard Multiplier</label><input type="number" id="sVehMult" value="${s.vehicleMultiplier || 1}" step="0.1" min="0.5"></div>
                        <div class="form-group"><label>Heavy-Duty Multiplier</label><input type="number" id="sHeavyMult" value="${s.heavyDutyMultiplier || 1.5}" step="0.1" min="1"></div>
                    </div>
                </div>
                <div class="card" style="margin-top:16px;">
                    <h3 style="margin-bottom:16px;">Fees</h3>
                    <div class="form-row" style="grid-template-columns:1fr 1fr;">
                        <div class="form-group"><label>Emergency Fee ($)</label><input type="number" id="sEmergFee" value="${s.emergencyFee || 50}" min="0"></div>
                        <div class="form-group"><label>After Hours Fee ($)</label><input type="number" id="sAfterFee" value="${s.afterHoursFee || 35}" min="0"></div>
                    </div>
                    <div class="form-row" style="grid-template-columns:1fr 1fr;">
                        <div class="form-group"><label>Sunday Fee ($)</label><input type="number" id="sSunFee" value="${s.sundayFee || 25}" min="0"></div>
                        <div class="form-group"><label>Holiday Fee ($)</label><input type="number" id="sHolFee" value="${s.holidayFee || 50}" min="0"></div>
                    </div>
                </div>
                <div class="card" style="margin-top:16px;">
                    <h3 style="margin-bottom:16px;">Profit Protection</h3>
                    <div class="form-group"><label>Global Minimum Profit ($)</label><input type="number" id="sMinProfit" value="${s.minimumProfit || 25}" min="0"></div>
                    <p style="color:var(--text-tertiary);font-size:0.8rem;">Per-service minimums override this in the Services tab.</p>
                </div>
            </div>

            <!-- Services Tab -->
            <div class="tab-content" id="tab-services">
                <div class="card">
                    <h3 style="margin-bottom:16px;">Service Configuration</h3>
                    <div id="servicesList"></div>
                    <button class="btn btn-secondary" style="margin-top:12px;width:100%;" onclick="addNewService()"><span class="material-icons">add</span> Add Service</button>
                </div>
            </div>

            <!-- Other Tab -->
            <div class="tab-content" id="tab-other">
                <div class="card">
                    <h3 style="margin-bottom:16px;">Expense Categories</h3>
                    <div class="form-group">
                        <label>Categories (comma separated)</label>
                        <input type="text" id="sExpCats" value="${escHtml((s.expenseCategories || []).join(', '))}">
                    </div>
                </div>
                <div class="card" style="margin-top:16px;">
                    <h3 style="margin-bottom:16px;">Service Areas</h3>
                    <div class="form-group">
                        <label>Areas (comma separated)</label>
                        <input type="text" id="sAreas" value="${escHtml((s.serviceAreas || []).join(', '))}">
                    </div>
                </div>
                <div class="card" style="margin-top:16px;">
                    <h3 style="margin-bottom:16px;">Account</h3>
                    <p style="color:var(--text-secondary);font-size:0.875rem;margin-bottom:12px;">Signed in as: ${escHtml(APP.user?.email)}</p>
                    <p style="color:var(--text-secondary);font-size:0.875rem;margin-bottom:12px;">Role: ${escHtml(s.role || 'owner')}</p>
                    <button class="btn btn-danger" onclick="doSignOut()"><span class="material-icons">logout</span> Sign Out</button>
                </div>
                <div class="card" style="margin-top:16px;">
                    <h3 style="margin-bottom:16px;">Data</h3>
                    <button class="btn btn-secondary" onclick="exportData()" style="width:100%;"><span class="material-icons">download</span> Export All Data (JSON)</button>
                </div>
            </div>

            <button class="btn btn-primary" style="width:100%;margin-top:24px;padding:16px;" onclick="saveSettings()">
                <span class="material-icons">save</span> Save All Settings
            </button>
        </div>`;

        // Tab switching
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById('tab-' + tab.dataset.tab)?.classList.add('active');
            });
        });

        // Logo upload handler
        document.getElementById('logoFileInput')?.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            if (file.size > 2 * 1024 * 1024) { showToast('Logo must be under 2MB.', 'warning'); return; }
            const status = document.getElementById('logoUploadStatus');
            if (status) status.textContent = 'Uploading...';
            try {
                const path = `users/${uid()}/logo_${Date.now()}.${file.name.split('.').pop()}`;
                const ref = storageRef(storage, path);
                await uploadBytes(ref, file);
                const url = await getDownloadURL(ref);
                document.getElementById('sBizLogo').value = url;
                if (status) status.textContent = 'Uploaded!';
                showToast('Logo uploaded! Save settings to apply.', 'success');
            } catch (err) {
                console.error('Logo upload error:', err);
                if (status) status.textContent = 'Upload failed';
                showToast('Error uploading logo. Make sure Firebase Storage is enabled.', 'error');
            }
        });

        // Render services list
        renderServicesConfig();
    }

    function renderServicesConfig() {
        const services = APP.settings?.services || [];
        const el = document.getElementById('servicesList');
        if (!el) return;
        el.innerHTML = services.map((s, i) => `
            <div class="card" style="margin-bottom:10px;padding:12px;background:var(--bg-primary);">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
                    <div style="display:flex;align-items:center;gap:8px;">
                        <span class="material-icons" style="color:var(--primary);">${escHtml(s.icon || 'build')}</span>
                        <strong>${escHtml(s.name)}</strong>
                    </div>
                    <label class="toggle-label"><input type="checkbox" class="svc-enabled" data-idx="${i}" ${s.enabled ? 'checked' : ''}><span class="toggle"></span></label>
                </div>
                <div class="form-row" style="grid-template-columns:1fr 1fr 1fr;gap:8px;">
                    <div class="form-group" style="margin:0;"><label style="font-size:0.75rem;">Base $</label><input type="number" class="svc-base" data-idx="${i}" value="${s.basePrice || 0}" min="0" style="padding:6px 8px;font-size:0.85rem;"></div>
                    <div class="form-group" style="margin:0;"><label style="font-size:0.75rem;">Min Profit $</label><input type="number" class="svc-minprofit" data-idx="${i}" value="${s.minProfit || 25}" min="0" style="padding:6px 8px;font-size:0.85rem;"></div>
                    <div class="form-group" style="margin:0;"><label style="font-size:0.75rem;">Icon</label><input type="text" class="svc-icon" data-idx="${i}" value="${escHtml(s.icon || 'build')}" style="padding:6px 8px;font-size:0.85rem;"></div>
                </div>
                <div style="display:flex;gap:12px;margin-top:8px;">
                    <label class="toggle-label" style="font-size:0.8rem;"><input type="checkbox" class="svc-permile" data-idx="${i}" ${s.perMile ? 'checked' : ''}><span class="toggle"></span> Per-mile</label>
                    <label class="toggle-label" style="font-size:0.8rem;"><input type="checkbox" class="svc-heavy" data-idx="${i}" ${s.heavyDuty ? 'checked' : ''}><span class="toggle"></span> Heavy-duty</label>
                    <label class="toggle-label" style="font-size:0.8rem;"><input type="checkbox" class="svc-tire" data-idx="${i}" ${s.tireRelated ? 'checked' : ''}><span class="toggle"></span> Tire</label>
                    <button class="btn-icon" style="margin-left:auto;color:var(--danger);" onclick="removeService(${i})"><span class="material-icons">delete</span></button>
                </div>
            </div>`).join('');
    }

    function addNewService() {
        APP.settings.services.push({ id: 's' + Date.now(), name: 'New Service', icon: 'build', basePrice: 50, minProfit: 25, enabled: true, perMile: true, heavyDuty: false, tireRelated: false });
        renderServicesConfig();
    }

    function removeService(idx) {
        if (!confirm('Remove this service?')) return;
        APP.settings.services.splice(idx, 1);
        renderServicesConfig();
    }

    async function saveSettings() {
        showLoading();
        // Collect services from DOM
        const services = (APP.settings?.services || []).map((s, i) => ({
            ...s,
            enabled: document.querySelector(`.svc-enabled[data-idx="${i}"]`)?.checked ?? s.enabled,
            basePrice: Number(document.querySelector(`.svc-base[data-idx="${i}"]`)?.value) || s.basePrice,
            minProfit: Number(document.querySelector(`.svc-minprofit[data-idx="${i}"]`)?.value) || s.minProfit,
            icon: document.querySelector(`.svc-icon[data-idx="${i}"]`)?.value || s.icon,
            perMile: document.querySelector(`.svc-permile[data-idx="${i}"]`)?.checked ?? s.perMile,
            heavyDuty: document.querySelector(`.svc-heavy[data-idx="${i}"]`)?.checked ?? s.heavyDuty,
            tireRelated: document.querySelector(`.svc-tire[data-idx="${i}"]`)?.checked ?? s.tireRelated,
        }));

        const updates = {
            businessName: document.getElementById('sBizName')?.value?.trim() || APP.settings.businessName,
            phone: document.getElementById('sBizPhone')?.value?.trim() || '',
            email: document.getElementById('sBizEmail')?.value?.trim() || '',
            baseLocation: document.getElementById('sBizBase')?.value?.trim() || '',
            logoUrl: document.getElementById('sBizLogo')?.value?.trim() || '',
            websiteLink: document.getElementById('sBizWeb')?.value?.trim() || '',
            businessType: document.getElementById('sBizType')?.value || 'mobile_tire',
            primaryColor: document.getElementById('sPrimary')?.value || '#6c5ce7',
            accentColor: document.getElementById('sAccent')?.value || '#00cec9',
            invoiceFooter: document.getElementById('sInvFooter')?.value?.trim() || '',
            reviewLink: document.getElementById('sReview')?.value?.trim() || '',
            freeMiles: Number(document.getElementById('sFreeMiles')?.value) || 10,
            perMileRate: Number(document.getElementById('sPerMile')?.value) || 3,
            vehicleMultiplier: Number(document.getElementById('sVehMult')?.value) || 1,
            heavyDutyMultiplier: Number(document.getElementById('sHeavyMult')?.value) || 1.5,
            emergencyFee: Number(document.getElementById('sEmergFee')?.value) || 50,
            afterHoursFee: Number(document.getElementById('sAfterFee')?.value) || 35,
            sundayFee: Number(document.getElementById('sSunFee')?.value) || 25,
            holidayFee: Number(document.getElementById('sHolFee')?.value) || 50,
            minimumProfit: Number(document.getElementById('sMinProfit')?.value) || 25,
            expenseCategories: (document.getElementById('sExpCats')?.value || '').split(',').map(c => c.trim()).filter(Boolean),
            serviceAreas: (document.getElementById('sAreas')?.value || '').split(',').map(a => a.trim()).filter(Boolean),
            services: services,
            updatedAt: serverTimestamp()
        };

        try {
            await settingsRef().update(updates);
            Object.assign(APP.settings, updates);
            applyBranding();
            showToast('Settings saved!', 'success');
        } catch (err) {
            console.error('Save settings error:', err);
            showToast('Error saving settings.', 'error');
        }
        hideLoading();
    }

    async function exportData() {
        showLoading();
        try {
            const collections = ['jobs', 'inventory', 'expenses', 'customers', 'invoices', 'quotes'];
            const data = { settings: APP.settings, exportDate: new Date().toISOString() };
            for (const col of collections) {
                const snap = await userRef(col).get();
                data[col] = snap.docs.map(d => ({ id: d.id, ...d.data() }));
            }
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `mobile-service-os-export-${new Date().toISOString().split('T')[0]}.json`;
            a.click(); URL.revokeObjectURL(url);
            showToast('Data exported!', 'success');
        } catch (err) { showToast('Export failed.', 'error'); }
        hideLoading();
    }

    // ─── Debounce Utility ───────────────────────────────────────────────
    function debounce(fn, ms) {
        let timer;
        return function(...args) { clearTimeout(timer); timer = setTimeout(() => fn.apply(this, args), ms); };
    }

    // ─── Sign Out Helper (used by onclick in HTML) ────────────────────
    function doSignOut() { signOut(auth); closeModal(); }

    // ─── Expose Functions to Global Scope (required for onclick attrs) ──
    // In a <script type="module">, functions are module-scoped.
    // onclick="" attributes can only call window-level functions.
    Object.assign(window, {
        // Auth
        showLoginForm, showRegisterForm, showForgotPasswordForm, doSignOut,
        // Navigation
        navigateTo, closeModal,
        // Onboarding
        skipOnboarding, finishOnboarding, selectBusinessType,
        nextOnboardStep, prevOnboardStep,
        // Services View
        addServiceFromView, editServiceFromView, deleteServiceFromView,
        toggleServiceEnabled, loadTemplateServices, applyTemplate,
        // Jobs
        viewJob, editJobById, completeJob, deleteJob, createInvoiceFromJob,
        // Inventory
        showAddInventory, viewInventoryItem, editInventoryItem, deleteInventoryItem,
        bulkImportInventory, processBulkImport,
        // Expenses
        showAddExpense, viewExpense, editExpenseById, deleteExpense,
        // Customers
        showAddCustomer, viewCustomer, editCustomerById, deleteCustomer,
        createJobForCustomer, sendReviewToCustomer,
        // Quotes
        calcQuickQuote, saveQuote, viewQuote, convertQuoteToJob,
        updateQuoteStatus, copyQuoteText,
        // Invoices
        showCreateInvoice, viewInvoice, toggleInvoiceStatus, printInvoice,
        copyInvoiceText, deleteInvoice,
        // Reviews
        generateReviewRequest, copyReviewMsg, shareReviewMsg,
        // Settings
        saveSettings, addNewService, removeService, exportData,
        // Dashboard Quick Quote
        dashQuickToJob,
        // After-Job Actions
        showAfterJobActions, afterJobInvoice, afterJobReview,
        afterJobMarkPaid, afterJobShare, afterJobFollowUp, saveFollowUp,
        // Invoice PDF
        generateInvoicePDF, shareInvoicePDF,
    });

    // ─── App Init Complete ──────────────────────────────────────────────
    console.log('Mobile Service OS loaded — Firebase modular SDK v10.');
    </script>
</body>
</html>
