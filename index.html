                      <div style={{fontSize:11,color:'#bbb',marginBottom:6}}>Split %</div>
                      <input type="number" style={{...si,width:80}} value={profile[pk]||0} onChange={e=>up(pk,Number(e.target.value||0))} disabled={!on}/>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
          <div className="sec">Goals</div>
          <div className="card">
            <div className="crow"><div style={{flex:1}}><div style={{fontSize:13,fontWeight:600}}>Weekly Gross Profit Goal</div></div><input type="number" style={{...si,width:110}} value={profile.weeklyGoal||0} onChange={e=>up('weeklyGoal',Number(e.target.value||0))}/></div>
            <div className="crow"><div style={{flex:1}}><div style={{fontSize:13,fontWeight:600}}>Tax Rate (%)</div></div><input type="number" style={{...si,width:80}} value={profile.taxRate||0} onChange={e=>up('taxRate',Number(e.target.value||0))}/></div>
          </div>
        </>)}

        {sec==='pricing'&&(<>
          <div className="sec" style={{marginTop:0}}>Decision Engine</div>
          <div className="card">
            {[['Base Repair Target Profit','repairTarget'],['Base Replacement Target Profit','replaceTarget'],['Skip if profit below ($)','skipThreshold'],['Risky if beyond (miles)','riskyMiles']].map(([l,k])=>(
              <div className="crow" key={k}><div style={{flex:1,fontSize:13,fontWeight:600}}>{l}</div><input type="number" style={{...si,width:90}} value={profile[k]||0} onChange={e=>up(k,Number(e.target.value||0))}/></div>
            ))}
          </div>
        </>)}

        {sec==='travel'&&(<>
          <div className="sec" style={{marginTop:0}}>Travel Config</div>
          <div className="card">
            {[['Your cost / mile ($)','costPerMile'],['Charge customer / mile ($)','chargePerMile'],['Free radius (miles)','freeRadiusMiles']].map(([l,k])=>(
              <div className="crow" key={k}><div style={{flex:1,fontSize:13,fontWeight:600}}>{l}</div><input type="number" step="0.01" style={{...si,width:90}} value={profile[k]||0} onChange={e=>up(k,Number(e.target.value||0))}/></div>
            ))}
          </div>
          <div className="sec">Condition Fees</div>
          <div className="card">
            {[['Emergency fee ($)','emergencyFee'],['Late-night fee ($)','lateNightFee'],['Highway fee ($)','highwayFee'],['Weekend fee ($)','weekendFee']].map(([l,k])=>(
              <div className="crow" key={k}><div style={{flex:1,fontSize:13,fontWeight:600}}>{l}</div><input type="number" style={{...si,width:90}} value={profile[k]||0} onChange={e=>up(k,Number(e.target.value||0))}/></div>
            ))}
          </div>
        </>)}

        {sec==='expenses'&&(<>
          <div className="sec" style={{marginTop:0}}>Monthly Fixed Expenses</div>
          <div className="card">
            {(profile.expenses||[]).map(e=>(
              <div key={e.id} style={{display:'grid',gridTemplateColumns:'1fr 90px auto auto',gap:8,alignItems:'center',padding:'10px 16px',borderBottom:'1px solid #f5f5f5'}}>
                <input value={e.name} onChange={x=>upE(e.id,{name:x.target.value})} style={si} placeholder="Expense name"/>
                <input type="number" value={e.amount||''} onChange={x=>upE(e.id,{amount:Number(x.target.value||0)})} style={si} placeholder="0"/>
                <Tog on={e.active} set={v=>upE(e.id,{active:v})}/>
                <button className="btn b-danger b-xs" onClick={()=>delE(e.id)}>×</button>
              </div>
            ))}
            <div className="crow">
              <button className="btn b-secondary b-sm" onClick={addE}>+ Add</button>
              <div style={{textAlign:'right'}}>
                <div style={{fontFamily:'"JetBrains Mono",monospace',fontSize:14,fontWeight:700}}>{money(mFixed(profile))}/mo</div>
                <div style={{fontSize:11,color:'#aaa'}}>{money(wFixed(profile))}/wk</div>
              </div>
            </div>
          </div>
        </>)}

        {sec==='data'&&(<>
          <div className="sec" style={{marginTop:0}}>Export & Backup</div>
          <div className="card">
            <div className="crow"><div><div style={{fontSize:13,fontWeight:700}}>Export CSV</div><div style={{fontSize:11,color:'#aaa'}}>Jobs for QuickBooks / Excel</div></div><button className="btn b-secondary b-sm" onClick={exportCSVClick}>CSV</button></div>
            <div className="crow"><div><div style={{fontSize:13,fontWeight:700}}>Export Full Backup</div><div style={{fontSize:11,color:'#aaa'}}>Jobs, services, settings</div></div><button className="btn b-secondary b-sm" onClick={exportJSON}>JSON</button></div>
            <div className="crow"><div><div style={{fontSize:13,fontWeight:700}}>Import Backup</div><div style={{fontSize:11,color:'#aaa'}}>Restore from .json file</div></div><button className="btn b-secondary b-sm" onClick={importJSON}>Import</button></div>
            <div className="crow"><div><div style={{fontSize:13,fontWeight:700,color:'#dc2626'}}>Reset App</div><div style={{fontSize:11,color:'#dc2626'}}>Clears all local data</div></div><button className="btn b-danger b-sm" onClick={clearAll}>Reset</button></div>
          </div>
          <div className="sec">Workspace Info</div>
          <div className="card">
            <div className="crow"><div style={{fontSize:12,color:'#aaa'}}>Workspace ID</div><div style={{fontFamily:'"JetBrains Mono",monospace',fontSize:11,color:'#ccc',maxWidth:180,overflow:'hidden',textOverflow:'ellipsis'}}>{profile.uid||'—'}</div></div>
            <div className="crow"><div style={{fontSize:12,color:'#aaa'}}>Business Type</div><div style={{fontSize:12,fontWeight:700}}>{BIZ[profile.businessType]?.label||'—'}</div></div>
            <div className="crow"><div style={{fontSize:12,color:'#aaa'}}>Data structure</div><div style={{fontSize:11,color:'#bbb'}}>workspaces/{'{uid}'}/…</div></div>
          </div>
          <div style={{textAlign:'center',padding:'10px 0',fontSize:11,color:'#ccc',lineHeight:1.7}}>Mobile Service OS · v3<br/>All data is workspace-scoped and synced via Firebase</div>
        </>)}
      </div>
    </div>
  );
}

// ─── App Root ─────────────────────────────────────────────────────────────────
// ─── Auth/onboarding flow ─────────────────────────────────────────────────────
// ROUTE:  Welcome → Auth → Onboarding → App
// Onboarding completion is persisted in:
//   1. workspace/{uid}/profile doc (Firebase) — source of truth
//   2. localStorage per uid — fast local cache
// On load: check local cache first. If onboarded, skip to App immediately.
// Firebase listener then verifies and updates profile in background.
// This prevents the "refresh sends back to onboarding" bug.

function App(){
  const [stage,    setStage]    = useState('init'); // init|welcome|auth|onboarding|app
  const [user,     setUser]     = useState(null);
  const [profile,  setProfile]  = useState(DEF_PROFILE());
  const [jobs,     setJobs]     = useState([]);
  const [services, setServices] = useState([]);
  const [expenses, setExpenses] = useState([]);
  const [prefill,  setPrefill]  = useState(null);
  const [tab,      setTab]      = useState('dashboard');
  const [sync,     setSync]     = useState('local');

  // ── Step 1: auth listener — runs ONCE ──────────────────────────────────────
  useEffect(()=>{
    if(!_auth){setStage('welcome');return;}
    const unsub=_auth.onAuthStateChanged(u=>{
      if(u){
        setUser(u);
        // Check local cache first for instant load
        const K=lk(u.uid);
        const cached=ls(K.profile,null);
        if(cached?.onboardingDone===true){
          setProfile(cached);
          setJobs(ls(K.jobs,[]));
          setServices(dedupeServices(ls(K.services,[])));
          setExpenses(ls(K.expenses,[]));
          setStage('app'); // ← instant, no flash
        } else {
          setStage('onboarding');
        }
      } else {
        setStage('welcome');
      }
    });
    return ()=>unsub();
  },[]);

  // ── Step 2: Firebase listeners — only when in app ──────────────────────────
  useEffect(()=>{
    if(stage!=='app'||!user||!_db) return;
    const uid=user.uid, K=lk(uid);
    setSync('syncing');

    // Profile listener
    const uP=fbListenDoc(ws(uid)?.collection('profile')?.doc('main'),doc=>{
      if(doc?.onboardingDone===true){
        setProfile(p=>({...p,...doc}));
        lss(K.profile,{...profile,...doc});
      }
    });

    // Jobs — merge local + Firebase, never overwrite with empty
    const uJ=fbListen(wc(uid,'jobs'),docs=>{
      if(docs.length>0){
        const local=ls(K.jobs,[]);
        const fbIds=new Set(docs.map(d=>String(d.id)));
        const localOnly=local.filter(j=>!fbIds.has(String(j.id)));
        const merged=[...docs,...localOnly];
        setJobs(merged);lss(K.jobs,merged);
        if(localOnly.length) fbBatch(wc(uid,'jobs'),localOnly);
      } else {
        const local=ls(K.jobs,[]);
        if(local.length){fbBatch(wc(uid,'jobs'),local);setJobs(local);}
      }
      setSync('connected');
    });

    // Services listener — Map-based merge, never spread-concat
    const uS=fbListen(wc(uid,'services'),docs=>{
      if(docs.length>0){
        // Step 1: dedupe what Firebase returned (migration: fixes existing dupes)
        const fbDeduped=dedupeServices(docs);
        // Step 2: merge with local (local may have unsaved manual adds)
        const local=dedupeServices(ls(K.services,[]));
        const merged=mergeServices(local, fbDeduped); // Firebase wins on conflict
        setServices(merged);lss(K.services,merged);
        // Step 3: if we found dupes in Firebase, push clean version back
        if(fbDeduped.length<docs.length) fbBatch(wc(uid,'services'),fbDeduped);
      } else {
        // Firebase empty — only upload local if servicesSeeded already happened
        // (prevents re-seeding race condition)
        const local=dedupeServices(ls(K.services,[]));
        if(local.length){ fbBatch(wc(uid,'services'),local); setServices(local); }
      }
    });

    // Expenses
    const uE=fbListen(wc(uid,'expenses'),docs=>{
      if(docs.length>0){setExpenses(docs);lss(K.expenses,docs);}
      else{const l=ls(K.expenses,[]);if(l.length){fbBatch(wc(uid,'expenses'),l);setExpenses(l);}}
    });

    return ()=>{uP&&uP();uJ();uS();uE();};
  },[stage,user]);

  // ── Persist profile locally whenever it changes ────────────────────────────
  useEffect(()=>{if(user&&profile.onboardingDone)lss(lk(user.uid).profile,profile);},[profile,user]);

  // ── Sync profile to Firebase ───────────────────────────────────────────────
  useEffect(()=>{
    if(!user||!_db||!profile.onboardingDone) return;
    fbSetDoc(ws(user.uid)?.collection('profile')?.doc('main'),{...profile,uid:user.uid,updatedAt:new Date().toISOString()});
  },[profile,user]);

  // ── Sync services — always dedupe before writing ────────────────────────────
  useEffect(()=>{
    if(!user||!_db||stage!=='app') return;
    const d=dedupeServices(services); // final normalize before any write
    lss(lk(user.uid).services,d);
    if(d.length) fbBatch(wc(user.uid,'services'),d);
  },[services,user,stage]);

  // ── Save job ───────────────────────────────────────────────────────────────
  const saveJob=useCallback((job,andAdd)=>{
    const e={...job,id:job.id||uid()};
    setJobs(prev=>{const next=[e,...prev.filter(j=>j.id!==e.id)];lss(lk(user.uid).jobs,next);return next;});
    if(user&&_db) fbSet(wc(user.uid,'jobs'),e.id,e);
    if(!andAdd) setTab('dashboard');
  },[user]);

  const deleteJob=useCallback(id=>{
    setJobs(prev=>{const next=prev.filter(j=>j.id!==id);lss(lk(user.uid).jobs,next);return next;});
    if(user&&_db) fbDel(wc(user.uid,'jobs'),id);
  },[user]);

  const updateServices=useCallback(svcs=>{
    const d=dedupeServices(svcs); // normalize before save
    setServices(d);
    lss(lk(user.uid).services,d);
    if(user&&_db) fbBatch(wc(user.uid,'services'),d);
  },[user]);

  const updateExpenses=useCallback(exps=>{
    setExpenses(exps);lss(lk(user.uid).expenses,exps);
    if(user&&_db) fbBatch(wc(user.uid,'expenses'),exps);
  },[user]);

  const handleRepeat=useCallback(job=>{setPrefill(job);setTab('add');},[]);
  const signOut=async()=>{try{await _auth.signOut();}catch{}setUser(null);setStage('welcome');setProfile(DEF_PROFILE());setJobs([]);setServices([]);setExpenses([]);};

  // ── Onboarding complete ────────────────────────────────────────────────────
  const finishOnboarding=useCallback((newProfile,newServices)=>{
    const p={...newProfile,onboardingDone:true,servicesSeeded:true,uid:user?.uid||'',workspaceId:user?.uid||''};
    setProfile(p);
    // dedupeServices normalizes, then we store clean array — no spread concat
    const d=dedupeServices(newServices);
    setServices(d);
    if(user){
      const K=lk(user.uid);
      lss(K.profile,p);
      lss(K.services,d);
      // Persist to workspace — this is the ONLY place seeding writes to Firebase
      fbSetDoc(ws(user.uid)?.collection('profile')?.doc('main'),{...p,uid:user.uid,updatedAt:new Date().toISOString()});
      fbBatch(wc(user.uid,'services'),d);
    }
    setStage('app');
  },[user]);

  // ── Render ─────────────────────────────────────────────────────────────────
  if(stage==='init') return(
    <div style={{height:'100%',display:'flex',alignItems:'center',justifyContent:'center',background:'#0a0a0a',flexDirection:'column',gap:16}}>
      <img src={MSOS_LOGO} alt="Loading" style={{width:60,height:60,borderRadius:16,opacity:.6}}/>
      <div style={{color:'#333',fontSize:13}}>Loading…</div>
    </div>
  );
  if(stage==='welcome') return <Welcome onContinue={()=>setStage('auth')}/>;
  if(stage==='auth')    return <AuthScreen onAuth={u=>{setUser(u);const K=lk(u.uid);const cached=ls(K.profile,null);if(cached?.onboardingDone){setProfile(cached);setJobs(ls(K.jobs,[]));setServices(dedupeServices(ls(K.services,[])));setExpenses(ls(K.expenses,[]));setStage('app');}else{setStage('onboarding');}}}/>;
  if(stage==='onboarding') return <Onboarding user={user} onComplete={finishOnboarding}/>;

  const NAV=[{id:'dashboard',ico:'📊',l:'Home'},{id:'add',ico:'＋',l:'Add'},{id:'history',ico:'📋',l:'History'},{id:'payouts',ico:'💰',l:'Payouts'},{id:'expenses',ico:'🧾',l:'Expenses'},{id:'services',ico:'🛠',l:'Services'},{id:'settings',ico:'⚙️',l:'Settings'}];

  return(
    <div className="app">
      <Header profile={profile} sync={sync} onSignOut={signOut}/>
      {tab==='dashboard'&&<Dashboard jobs={jobs} services={services} profile={profile} setTab={setTab} onRepeat={handleRepeat}/>}
      {tab==='add'      &&<AddJob onSave={saveJob} profile={profile} services={services} jobs={jobs} prefill={prefill} onClear={()=>setPrefill(null)}/>}
      {tab==='history'  &&<History jobs={jobs} profile={profile} setJobs={jbs=>{setJobs(jbs);lss(lk(user.uid).jobs,jbs);if(user&&_db)jbs.forEach(j=>fbSet(wc(user.uid,'jobs'),j.id,j));}} onRepeat={handleRepeat}/>}
      {tab==='payouts'  &&<Payouts jobs={jobs} profile={profile}/>}
      {tab==='expenses' &&<Expenses expenses={expenses} setExpenses={updateExpenses}/>}
      {tab==='services' &&<Services services={services} setServices={updateServices} profile={profile}/>}
      {tab==='settings' &&<Settings profile={profile} setProfile={setProfile} jobs={jobs} setJobs={setJobs} expenses={expenses} services={services}/>}
      <nav className="nav">
        {NAV.map(({id,ico,l})=><button key={id} className={`nbtn ${tab===id?'on':''}`} onClick={()=>setTab(id)}><span className="ico">{ico}</span>{l}</button>)}
      </nav>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
