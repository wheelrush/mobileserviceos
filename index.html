<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0a0a0f">
    <meta name="description" content="Mobile Service OS - Professional service management platform">
    <title>Mobile Service OS</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">

    <style>
        :root {
            --primary: #6c5ce7;
            --accent: #00cec9;
            --success: #00b894;
            --warning: #fdcb6e;
            --danger: #e74c3c;
            --bg-primary: #0a0a0f;
            --bg-secondary: #14141f;
            --bg-tertiary: #1a1a28;
            --border: #1e1e2e;
            --text-primary: #e8e8f0;
            --text-secondary: #8888a8;
            --text-tertiary: #6666aa;
            --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.4);
            --shadow-lg: 0 16px 48px rgba(0, 0, 0, 0.5);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-fast: 0.15s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            font-size: 16px;
            -webkit-text-size-adjust: 100%;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.5;
            overflow-x: hidden;
            position: fixed;
            width: 100%;
            height: 100vh;
        }

        /* Typography */
        h1 { font-size: 2rem; font-weight: 700; line-height: 1.2; }
        h2 { font-size: 1.5rem; font-weight: 600; line-height: 1.3; }
        h3 { font-size: 1.25rem; font-weight: 600; line-height: 1.3; }
        h4 { font-size: 1.125rem; font-weight: 600; line-height: 1.4; }
        h5 { font-size: 1rem; font-weight: 600; line-height: 1.4; }
        h6 { font-size: 0.875rem; font-weight: 600; line-height: 1.4; letter-spacing: 0.5px; }

        p { color: var(--text-secondary); font-size: 0.9375rem; }
        small { font-size: 0.8125rem; color: var(--text-tertiary); }
        a { color: var(--primary); text-decoration: none; transition: color var(--transition); }
        a:hover { color: var(--accent); }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-primary);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--text-tertiary);
        }

        /* Main Layout */
        #appContainer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        #authScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 1000;
            animation: fadeIn 0.5s var(--transition);
        }

        #authScreen.hidden {
            display: none;
        }

        #appShell {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
        }

        /* Auth Card */
        .auth-container {
            width: 100%;
            max-width: 420px;
            animation: slideUp 0.6s var(--transition);
        }

        .auth-card {
            background: linear-gradient(135deg, rgba(20, 20, 31, 0.8) 0%, rgba(26, 26, 40, 0.6) 100%);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 32px 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .auth-logo {
            width: 56px;
            height: 56px;
            margin: 0 auto 16px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 700;
            color: white;
        }

        .auth-header h1 {
            font-size: 1.5rem;
            margin-bottom: 8px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .auth-header p {
            color: var(--text-secondary);
            font-size: 0.875rem;
        }

        /* Form Groups */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            font-family: inherit;
            font-size: 1rem;
            transition: all var(--transition);
        }

        .form-group input::placeholder {
            color: var(--text-tertiary);
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.1);
        }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 24px;
            border: none;
            border-radius: var(--radius-md);
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            text-decoration: none;
            white-space: nowrap;
            gap: 8px;
            min-height: 44px;
            touch-action: manipulation;
            -webkit-user-select: none;
            user-select: none;
            position: relative;
            z-index: 1;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, #7d6ff8 100%);
            color: white;
            width: 100%;
            box-shadow: 0 4px 16px rgba(108, 92, 231, 0.3);
        }

        .btn-primary:hover {
            box-shadow: 0 6px 24px rgba(108, 92, 231, 0.4);
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: var(--text-secondary);
        }

        .btn-icon {
            width: 44px;
            height: 44px;
            min-height: 44px;
            padding: 0;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .btn-small, .btn-sm {
            padding: 8px 16px;
            font-size: 0.875rem;
            min-height: 36px;
        }

        .btn-danger {
            background: linear-gradient(135deg, var(--danger) 0%, #d63c25 100%);
            color: white;
        }

        .btn-success {
            background: linear-gradient(135deg, var(--success) 0%, #009874 100%);
            color: white;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }

        /* Action button rows — prevent overlap */
        .action-row {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 16px;
        }
        .action-row .btn {
            flex: 1 1 auto;
            min-width: 100px;
            width: auto;
        }

        /* Auth Links */
        .auth-links {
            display: flex;
            justify-content: space-between;
            font-size: 0.875rem;
            margin-top: 16px;
        }

        .auth-links a {
            color: var(--primary);
        }

        /* Form Divider */
        .form-divider {
            display: flex;
            align-items: center;
            margin: 24px 0;
            gap: 12px;
        }

        .form-divider::before,
        .form-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }

        .form-divider span {
            font-size: 0.75rem;
            color: var(--text-tertiary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Social Button */
        .btn-social {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--border);
            color: var(--text-primary);
            width: 100%;
        }

        .btn-social:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: var(--primary);
        }

        /* Toggle Auth Forms */
        .auth-form {
            display: none;
        }

        .auth-form.active {
            display: block;
            animation: slideUp 0.4s var(--transition);
        }

        /* App Shell */
        #topBar {
            height: 56px;
            background: linear-gradient(180deg, rgba(20, 20, 31, 0.9) 0%, rgba(20, 20, 31, 0.8) 100%);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            gap: 12px;
            padding-top: max(0, env(safe-area-inset-top));
            backdrop-filter: blur(10px);
            z-index: 100;
        }

        .top-bar-title {
            font-size: 1.125rem;
            font-weight: 600;
            flex: 1;
        }

        .top-bar-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .top-bar-actions .btn-icon {
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
        }

        .top-bar-actions .btn-icon:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        /* Main Content Area */
        #mainContent {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            padding-bottom: 80px;
            transition: opacity 0.15s ease;
        }

        /* Bottom Navigation */
        #bottomNav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            height: calc(60px + max(0px, env(safe-area-inset-bottom)));
            background: rgba(14, 14, 22, 0.98);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: max(0px, env(safe-area-inset-bottom));
            backdrop-filter: blur(12px);
            z-index: 100;
        }

        .nav-item {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2px;
            color: var(--text-secondary);
            padding: 6px 0;
            cursor: pointer;
            transition: color var(--transition-fast);
            position: relative;
            font-size: 0.65rem;
            letter-spacing: 0.3px;
            min-height: 48px;
            touch-action: manipulation;
        }

        .nav-item.active {
            color: var(--primary);
        }
        .nav-item.active .material-icons {
            text-shadow: 0 0 12px rgba(108, 92, 231, 0.5);
        }

        .nav-item .material-icons {
            font-size: 22px;
        }

        .nav-center-spacer {
            width: 56px;
            flex-shrink: 0;
        }

        /* Floating Action Button */
        .fab {
            position: fixed;
            bottom: calc(30px + max(0px, env(safe-area-inset-bottom)));
            left: 50%;
            transform: translateX(-50%);
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            border: 3px solid var(--bg-primary);
            border-radius: 50%;
            color: white;
            font-size: 26px;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(108, 92, 231, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 101;
            transition: all var(--transition);
            touch-action: manipulation;
        }

        .fab:active {
            transform: translateX(-50%) scale(0.9);
        }

        .fab:hover {
            box-shadow: 0 8px 28px rgba(108, 92, 231, 0.6);
        }

        /* Cards */
        .card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 16px;
            transition: all var(--transition);
        }

        .card:hover {
            border-color: var(--text-tertiary);
            box-shadow: var(--shadow-sm);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .card-title {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .card-subtitle {
            font-size: 0.875rem;
            color: var(--text-secondary);
        }

        .card-content {
            font-size: 0.9375rem;
            color: var(--text-secondary);
        }

        /* Dashboard Grid */
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
            gap: 12px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .metric-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 16px;
            text-align: center;
        }

        .metric-value {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--primary);
            margin: 8px 0;
        }

        .metric-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Badge */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge-primary {
            background: rgba(108, 92, 231, 0.2);
            color: var(--primary);
        }

        .badge-success {
            background: rgba(0, 184, 148, 0.2);
            color: var(--success);
        }

        .badge-warning {
            background: rgba(253, 203, 110, 0.2);
            color: var(--warning);
        }

        .badge-danger {
            background: rgba(231, 76, 60, 0.2);
            color: var(--danger);
        }

        .badge-info {
            background: rgba(0, 206, 201, 0.2);
            color: var(--accent);
        }

        .badge-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-secondary);
        }

        /* View Structure */
        .view-container {
            padding: 20px 16px;
            padding-bottom: 100px;
            max-width: 960px;
            margin: 0 auto;
            animation: fadeIn 0.2s ease;
        }

        .view-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            gap: 12px;
        }

        .view-header h2 {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .metric-sub {
            font-size: 0.75rem;
            color: var(--text-tertiary);
            margin-top: 2px;
        }

        /* Suggestions Dropdown */
        .suggestions-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--bg-tertiary);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            max-height: 200px;
            overflow-y: auto;
            z-index: 1000;
            box-shadow: var(--shadow-md);
        }

        .suggestion-item {
            padding: 10px 14px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: background var(--transition-fast);
        }

        .suggestion-item:hover,
        .suggestion-item.active {
            background: var(--bg-secondary);
            color: var(--accent);
        }

        /* Tab Content */
        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.2s ease;
        }

        .tab {
            padding: 10px 20px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            color: var(--text-secondary);
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .tab:hover {
            border-color: var(--primary);
            color: var(--text-primary);
        }

        .tab.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }

        /* Status Badge */
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8125rem;
            font-weight: 500;
        }

        .status-active::before {
            content: '';
            width: 6px;
            height: 6px;
            background: var(--success);
            border-radius: 50%;
        }

        .status-pending::before {
            content: '';
            width: 6px;
            height: 6px;
            background: var(--warning);
            border-radius: 50%;
        }

        .status-completed::before {
            content: '';
            width: 6px;
            height: 6px;
            background: var(--primary);
            border-radius: 50%;
        }

        /* List Items */
        .list-item {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 14px 16px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: border-color var(--transition-fast);
            touch-action: manipulation;
        }

        .list-item:hover, .list-item:active {
            border-color: rgba(108, 92, 231, 0.4);
        }

        .list-item-left {
            flex: 1;
            min-width: 0;
        }

        .list-item-title {
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 2px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .list-item-subtitle {
            font-size: 0.8125rem;
            color: var(--text-secondary);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .list-item-right {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-shrink: 0;
        }

        /* Empty State */
        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 64px 32px;
            text-align: center;
            min-height: 400px;
        }

        .empty-state-icon {
            font-size: 64px;
            color: var(--text-tertiary);
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-state-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .empty-state-description {
            color: var(--text-secondary);
            max-width: 300px;
            margin-bottom: 24px;
        }

        /* Modal */
        .modal-backdrop {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: flex-end;
            z-index: 1100;
            animation: fadeIn 0.3s var(--transition);
        }

        .modal-backdrop.hidden {
            display: none;
        }

        .modal-content {
            width: 100%;
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg) var(--radius-lg) 0 0;
            padding: 20px 16px;
            padding-bottom: calc(20px + max(0, env(safe-area-inset-bottom)));
            max-height: 85vh;
            overflow-y: auto;
            animation: slideUp 0.4s var(--transition);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            position: sticky;
            top: -20px;
            background: var(--bg-secondary);
            padding-top: 4px;
            z-index: 2;
        }

        .modal-title {
            font-size: 1.125rem;
            font-weight: 600;
        }

        .modal-close {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 24px;
            padding: 0;
            width: 44px;
            height: 44px;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color var(--transition);
            flex-shrink: 0;
        }

        .modal-close:hover {
            color: var(--text-primary);
        }

        .modal-footer {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }
        .modal-footer .btn {
            flex: 1 1 auto;
            min-width: 90px;
            width: auto;
            font-size: 0.85rem;
            padding: 10px 14px;
        }

        /* Toast Notifications */
        #toastContainer {
            position: fixed;
            top: 16px;
            right: 16px;
            z-index: 2000;
            max-width: 400px;
            pointer-events: none;
        }

        .toast {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: var(--shadow-md);
            animation: slideIn 0.4s var(--transition);
            pointer-events: auto;
        }

        .toast-icon {
            font-size: 20px;
            flex-shrink: 0;
        }

        .toast.success .toast-icon {
            color: var(--success);
        }

        .toast.error .toast-icon {
            color: var(--danger);

            height: 48px;

            font-size: 20px;

            gap: 8px;
            border-bottom: 1px solid var(--border);
            padding: 0 16px;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .tab {

            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-weight: 500;
            font-size: 0.9375rem;
            border-bottom: 2px solid transparent;
            transition: all var(--transition);
            white-space: nowrap;
        }

        .tab.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
        }

        /* Toggle Switch */
        .toggle {
            position: relative;
            width: 44px;
            height: 26px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--border);
            border-radius: 13px;
            cursor: pointer;
            transition: all var(--transition);
            flex-shrink: 0;
            display: inline-block;
            vertical-align: middle;
        }

        .toggle.active {
            background: var(--primary);
            border-color: var(--primary);
        }

        .toggle::after {
            content: '';
            position: absolute;
            width: 22px;
            height: 22px;
            background: white;
            border-radius: 50%;
            top: 1px;
            left: 1px;
            transition: left var(--transition);
        }

        .toggle.active::after {
            left: 19px;
        }

        /* Toggle label — prevents overlap */
        .toggle-label {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 0.875rem;
            color: var(--text-secondary);
            min-height: 36px;
            padding: 4px 0;
            white-space: nowrap;

        .toggle-label input[type="checkbox"] {
            display: none;
        }

        /* Input Group */
        .input-group {
            position: relative;
        }

            padding-right: 40px;
        }

        .input-group .btn-icon {
            position: absolute;
            right: 4px;
            top: 50%;
            transform: translateY(-50%);
            width: 36px;
            height: 36px;
            background: none;
        }

        /* Chips/Tags */
        .chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            background: rgba(108, 92, 231, 0.15);
            border: 1px solid rgba(108, 92, 231, 0.3);
            border-radius: 16px;
            color: var(--primary);
            font-size: 0.8125rem;
            cursor: pointer;
            transition: all var(--transition);

            align-items: center;

            color: var(--text-primary);

        td {

            color: var(--text-secondary);
        }

        tbody tr:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        /* Form Row */
        .form-row {

            grid-template-columns: 1fr 1fr;
            gap: 12px;
            align-items: start;
        }

        .form-row.single {
            grid-template-columns: 1fr;
        }

        /* Form group spacing fix */
        .form-group {
            margin-bottom: 16px;
        }

            margin-bottom: 0;
        }

    // ─── Firestore Helpers (modular SDK with compat-style chaining) ────
    // Wrapper that lets existing code call userRef('jobs').orderBy(...).limit(...).get()
    // while using the modular SDK under the hood. This avoids rewriting 100+ call sites.

    function _wrapCollection(colRef) {
        const constraints = [];
        const wrapper = {
            orderBy(field, dir = 'asc') { constraints.push(orderBy(field, dir)); return wrapper; },
            where(field, op, val)       { constraints.push(where(field, op, val)); return wrapper; },
            limit(n)                    { constraints.push(limit(n)); return wrapper; },
            async get() {
                const q = constraints.length > 0 ? query(colRef, ...constraints) : colRef;
                return getDocs(q);
            },
            async add(data) {
                return addDoc(colRef, data);
            },
            doc(docId) {
                const ref = doc(colRef, docId);
                return {
                    async get()        { return getDoc(ref); },
                    async set(data)    { return setDoc(ref, data); },
                    async update(data) { return updateDoc(ref, data); },
                    async delete()     { return deleteDoc(ref); },
                    get id()           { return ref.id; }
                };
            }
        };
        return wrapper;
    }

    function _wrapDoc(docRef) {
        return {
            async get()        { return getDoc(docRef); },
            async set(data)    { return setDoc(docRef, data); },
            async update(data) { return updateDoc(docRef, data); },
            async delete()     { return deleteDoc(docRef); },
            get id()           { return docRef.id; }
        };
    }

    function formatDate(d) {
        if (!d) return '—';
        const dt = d.toDate ? d.toDate() : new Date(d);
        return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }
    function formatDateShort(d) {
        if (!d) return '—';
        const dt = d.toDate ? d.toDate() : new Date(d);
        return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }
    function timeAgo(d) {
        if (!d) return '';
        const dt = d.toDate ? d.toDate() : new Date(d);
        const diff = (Date.now() - dt.getTime()) / 1000;
        if (diff < 60) return 'just now';
        if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
        if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
        if (diff < 604800) return Math.floor(diff / 86400) + 'd ago';
        return formatDateShort(d);
    }
    function weekStart() {
        const d = new Date(); d.setHours(0,0,0,0);
        d.setDate(d.getDate() - d.getDay());
        return d;

    function monthStart() {
        const d = new Date(); d.setHours(0,0,0,0); d.setDate(1);

        const icons = { success: 'check_circle', error: 'error', warning: 'warning', info: 'info' };
        toast.innerHTML = `<span class="material-icons">${icons[type] || 'info'}</span><span>${escHtml(message)}</span>`;
        container.appendChild(toast);
        requestAnimationFrame(() => toast.classList.add('show'));
        setTimeout(() => {

            setTimeout(() => toast.remove(), 300);

    }

            'auth/popup-closed-by-user': 'Sign-in popup was closed.',

        const main = document.getElementById('mainContent');

        try {
            const ts = todayStart();
            const ws = weekStart();
            const ms = monthStart();
            const [jobsSnap, expSnap, invSnap, invAllSnap] = await Promise.all([
                userRef('jobs').orderBy('createdAt', 'desc').limit(200).get(),
                userRef('expenses').orderBy('date', 'desc').limit(200).get(),
                userRef('inventory').get(),
                userRef('invoices').orderBy('createdAt', 'desc').limit(50).get()
            ]);
            const jobs = jobsSnap.docs.map(d => ({ id: d.id, ...d.data() }));
            const expenses = expSnap.docs.map(d => ({ id: d.id, ...d.data() }));
            const inventory = invSnap.docs.map(d => ({ id: d.id, ...d.data() }));
            const invoices = invAllSnap.docs.map(d => ({ id: d.id, ...d.data() }));

            // Helper to get date from firestore timestamp or string

            const todayMaterials = todayCompleted.reduce((s, j) => s + (Number(j.materialCost) || 0), 0);
            const todayPending = todayJobs.filter(j => j.status === 'pending_payment' || j.status === 'scheduled').length;
            const todayExpenses = expenses.filter(e => e.date && toDate(e.date) >= ts).reduce((s, e) => s + (Number(e.amount) || 0), 0);
            const todayProfit = todayRevenue - todayMaterials - todayExpenses;
            const todayUnpaid = invoices.filter(i => i.status === 'unpaid' && i.createdAt && toDate(i.createdAt) >= ts);

            // Week stats
            const weekJobs = jobs.filter(j => j.createdAt && toDate(j.createdAt) >= ws);
            const completedWeek = weekJobs.filter(j => j.status === 'completed');
            const weekRevenue = completedWeek.reduce((s, j) => s + (Number(j.finalPrice) || 0), 0);
            const weekMaterials = completedWeek.reduce((s, j) => s + (Number(j.materialCost) || 0), 0);
            const weekExpenses = expenses.filter(e => e.date && toDate(e.date) >= ws).reduce((s, e) => s + (Number(e.amount) || 0), 0);
            const weekProfit = weekRevenue - weekMaterials - weekExpenses;

            // Month stats
            const monthJobs = jobs.filter(j => j.createdAt && toDate(j.createdAt) >= ms);
            const completedMonth = monthJobs.filter(j => j.status === 'completed');
            const monthRevenue = completedMonth.reduce((s, j) => s + (Number(j.finalPrice) || 0), 0);
            const monthMaterials = completedMonth.reduce((s, j) => s + (Number(j.materialCost) || 0), 0);
            const monthExpenses = expenses.filter(e => e.date && toDate(e.date) >= ms).reduce((s, e) => s + (Number(e.amount) || 0), 0);
            const monthProfit = monthRevenue - monthMaterials - monthExpenses;

            const lowStock = inventory.filter(i => (Number(i.quantity) || 0) <= (Number(i.lowStockThreshold) || 3)).length;
            const unpaidInvoices = invoices.filter(i => i.status === 'unpaid');
            const unpaidTotal = unpaidInvoices.reduce((s, i) => s + (Number(i.amount) || 0), 0);

                    </div>
                    <div class="card metric-card" style="padding:12px 8px;">
                        <div class="metric-label" style="font-size:0.65rem;">Pending</div>
                        <div class="metric-value" style="font-size:1.3rem;color:var(--warning);margin:4px 0;">${todayPending}</div>
                    </div>
                    <div class="card metric-card" style="padding:12px 8px;">
                        <div class="metric-label" style="font-size:0.65rem;">Expenses</div>
                        <div class="metric-value" style="font-size:1.3rem;color:var(--danger);margin:4px 0;">${money(todayExpenses)}</div>
                    </div>
                    <div class="card metric-card" style="padding:12px 8px;">
                        <div class="metric-label" style="font-size:0.65rem;">Profit</div>
                        <div class="metric-value" style="font-size:1.3rem;color:${todayProfit >= 0 ? 'var(--success)' : 'var(--danger)'};margin:4px 0;">${money(todayProfit)}</div>
                    </div>
                </div>

                <!-- THIS WEEK / MONTH -->
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;">

                        <div style="display:flex;justify-content:space-between;padding:4px 0;"><span style="color:var(--text-secondary);font-size:0.8rem;">Expenses</span><span style="font-weight:600;color:var(--danger);font-size:0.85rem;">${money(weekExpenses)}</span></div>
                        <div style="display:flex;justify-content:space-between;padding:6px 0 0;border-top:1px solid var(--border);margin-top:4px;"><span style="color:var(--text-primary);font-size:0.85rem;font-weight:600;">Profit</span><span style="font-weight:700;color:${weekProfit >= 0 ? 'var(--success)' : 'var(--danger)'};font-size:0.95rem;">${money(weekProfit)}</span></div>
                    </div>
                    <div class="card" style="padding:14px;">
                        <div style="font-size:0.7rem;text-transform:uppercase;letter-spacing:0.5px;color:var(--text-tertiary);margin-bottom:8px;">This Month</div>
                        <div style="display:flex;justify-content:space-between;padding:4px 0;"><span style="color:var(--text-secondary);font-size:0.8rem;">Revenue</span><span style="font-weight:600;color:var(--success);font-size:0.85rem;">${money(monthRevenue)}</span></div>
                        <div style="display:flex;justify-content:space-between;padding:4px 0;"><span style="color:var(--text-secondary);font-size:0.8rem;">Expenses</span><span style="font-weight:600;color:var(--danger);font-size:0.85rem;">${money(monthExpenses)}</span></div>
                        <div style="display:flex;justify-content:space-between;padding:6px 0 0;border-top:1px solid var(--border);margin-top:4px;"><span style="color:var(--text-primary);font-size:0.85rem;font-weight:600;">Profit</span><span style="font-weight:700;color:${monthProfit >= 0 ? 'var(--success)' : 'var(--danger)'};font-size:0.95rem;">${money(monthProfit)}</span></div>

                </div>

                ${unpaidInvoices.length > 0 ? `

                        <button class="btn btn-sm btn-secondary" style="min-height:32px;padding:4px 12px;" onclick="navigateTo('invoices')">View</button>

                <!-- QUICK QUOTE -->
                ${services.length > 0 ? `
                <div class="card" style="margin-bottom:16px;">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
                        <h3 style="font-size:1rem;"><span class="material-icons" style="font-size:18px;vertical-align:middle;color:var(--accent);">calculate</span> Quick Quote</h3>
                    </div>
                    <div class="form-row" style="grid-template-columns:1fr auto;gap:8px;align-items:end;">
                        <div class="form-group" style="margin:0;">
                            <select id="dashQQSvc" style="padding:10px 12px;font-size:0.85rem;">
                                ${services.map(s => `<option value="${escHtml(s.name)}" data-base="${s.basePrice}" data-min="${s.minProfit}">${escHtml(s.name)}</option>`).join('')}
                            </select>
                        </div>
                        <div class="form-group" style="margin:0;">
                            <input type="number" id="dashQQMiles" placeholder="Miles" value="0" min="0" style="padding:10px 12px;font-size:0.85rem;width:80px;">
                        </div>
                    </div>
                    <div id="dashQQResult" style="display:flex;align-items:center;justify-content:space-between;margin-top:10px;padding:10px 14px;background:var(--bg-tertiary);border-radius:var(--radius-sm);">
                        <span style="color:var(--text-secondary);font-size:0.85rem;">Suggested Price</span>
                        <span id="dashQQPrice" style="font-weight:700;font-size:1.2rem;color:var(--accent);">$0.00</span>
                    </div>
                    <div style="display:flex;gap:8px;margin-top:10px;">
                        <button class="btn btn-primary btn-sm" style="flex:1;" onclick="dashQuickToJob()"><span class="material-icons">add</span> Create Job</button>
                        <button class="btn btn-secondary btn-sm" style="flex:1;" onclick="navigateTo('quotes')">Full Quote</button>
                    </div>
                </div>` : ''}

                <!-- QUICK ACTIONS -->
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px;">
                    <button class="btn btn-primary" onclick="navigateTo('newjob')" style="font-size:0.85rem;padding:14px 12px;"><span class="material-icons">add</span> New Job</button>
                    <button class="btn btn-secondary" onclick="navigateTo('expenses')" style="font-size:0.85rem;padding:14px 12px;"><span class="material-icons">receipt</span> Add Expense</button>
                </div>

                <!-- RECENT JOBS -->
                <div class="card" style="margin-bottom:16px;">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
                        <h3 style="font-size:1rem;">Recent Jobs</h3>
                        <button class="btn btn-sm btn-secondary" style="min-height:32px;padding:4px 12px;" onclick="navigateTo('jobs')">All</button>
                    </div>
                    ${recentJobs.length === 0 ? '<p style="color:var(--text-tertiary);text-align:center;padding:20px 0;font-size:0.875rem;">No jobs yet — tap + to create your first!</p>' :
                    recentJobs.map(j => `
                        <div class="list-item" onclick="viewJob('${j.id}')">
                            <div style="flex:1;min-width:0;">
                                <div style="font-weight:600;font-size:0.9rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escHtml(j.serviceType || 'Service')}</div>
                                <div style="font-size:0.8rem;color:var(--text-secondary);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escHtml(j.customerName || 'Walk-in')} · ${escHtml(j.location || '')}</div>
                            </div>
                            <div style="text-align:right;flex-shrink:0;">
                                <div style="font-weight:700;color:var(--success);">${money(j.finalPrice)}</div>
                                <span class="badge badge-${statusBadge(j.status)}" style="font-size:0.6rem;padding:2px 8px;">${statusLabel(j.status)}</span>
                            </div>
                        </div>`).join('')}
                </div>

                ${lowStock > 0 ? `<div class="card" style="margin-bottom:16px;border-left:3px solid var(--danger);padding:12px 14px;cursor:pointer;" onclick="navigateTo('inventory')"><span class="material-icons" style="font-size:16px;vertical-align:middle;color:var(--danger);">warning</span> <strong style="font-size:0.9rem;">${lowStock} items low on stock</strong></div>` : ''}
            `;

            // Setup dashboard quick quote
            const qqCalc = () => {
                const sel = document.getElementById('dashQQSvc');
                if (!sel) return;
                const opt = sel.options[sel.selectedIndex];
                const base = Number(opt?.dataset?.base) || 0;
                const miles = Number(document.getElementById('dashQQMiles')?.value) || 0;
                const freeMi = APP.settings?.freeMiles || 10;
                const perMi = APP.settings?.perMileRate || 3;
                const travel = Math.max(0, miles - freeMi) * perMi;
                const price = base + travel;
                const el = document.getElementById('dashQQPrice');
                if (el) el.textContent = money(price);
            };
            document.getElementById('dashQQSvc')?.addEventListener('change', qqCalc);
            document.getElementById('dashQQMiles')?.addEventListener('input', qqCalc);
            qqCalc();

        } catch (err) {
            console.error('Dashboard error:', err);
            document.getElementById('dashContent').innerHTML = '<div class="card"><p style="color:var(--danger);">Error loading dashboard. Please try again.</p></div>';
        }
    }

    function dashQuickToJob() {
        const svc = document.getElementById('dashQQSvc')?.value || '';
        const miles = Number(document.getElementById('dashQQMiles')?.value) || 0;
        renderJobForm({ serviceType: svc, milesFromBase: miles });
    }

    function statusBadge(s) {
        const map = { pending_payment: 'warning', scheduled: 'info', in_progress: 'primary', completed: 'success', canceled: 'danger' };
        return map[s] || 'info';
    }
    function statusLabel(s) {
        const map = { pending_payment: 'Pending Payment', scheduled: 'Scheduled', in_progress: 'In Progress', completed: 'Completed', canceled: 'Canceled' };
        return map[s] || s;
    }

    // ─── JOBS LIST ──────────────────────────────────────────────────────
    async function renderJobs() {
        const main = document.getElementById('mainContent');
        main.innerHTML = `
        <div class="view-container">
            <div class="view-header">
                <h2>Jobs</h2>
                <button class="btn btn-primary btn-sm" onclick="navigateTo('newjob')"><span class="material-icons">add</span> New Job</button>
            </div>
            <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;">
                <input type="text" id="jobSearch" class="search-input" placeholder="Search jobs..." style="flex:1;min-width:200px;">
                <select id="jobStatusFilter" class="form-control" style="width:auto;">
                    <option value="">All Status</option>
                    <option value="pending_payment">Pending Payment</option>
                    <option value="scheduled">Scheduled</option>
                    <option value="in_progress">In Progress</option>
                    <option value="completed">Completed</option>
                    <option value="canceled">Canceled</option>
                </select>
            </div>
            <div id="jobsList"><div style="text-align:center;padding:40px;"><div class="spinner"></div></div></div>
        </div>`;

        const snap = await userRef('jobs').orderBy('createdAt', 'desc').limit(200).get();
        const jobs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        APP.cache.jobs = jobs;

        function renderList(filter = '', status = '') {
            const f = filter.toLowerCase();
            const filtered = jobs.filter(j => {
                if (status && j.status !== status) return false;
                if (f) {
                    const searchable = `${j.serviceType} ${j.customerName} ${j.location} ${j.customerPhone} ${j.notes}`.toLowerCase();
                    return searchable.includes(f);
                }
                return true;
            });
            const el = document.getElementById('jobsList');
            if (!el) return;
            if (filtered.length === 0) {
                el.innerHTML = '<div class="empty-state"><span class="material-icons" style="font-size:48px;color:var(--text-tertiary);">assignment</span><p>No jobs found</p></div>';
                return;
            }
            el.innerHTML = filtered.map(j => `
                <div class="card list-item" onclick="viewJob('${j.id}')" style="cursor:pointer;margin-bottom:10px;">
                    <div style="flex:1;">
                        <div style="display:flex;align-items:center;gap:8px;">
                            <span class="material-icons" style="font-size:20px;color:var(--primary);">${getServiceIcon(j.serviceType)}</span>
                            <span style="font-weight:600;">${escHtml(j.serviceType || 'Service')}</span>
                            <span class="badge badge-${statusBadge(j.status)}" style="font-size:0.7rem;">${statusLabel(j.status)}</span>
                        </div>
                        <div style="font-size:0.85rem;color:var(--text-secondary);margin-top:4px;">
                            ${escHtml(j.customerName || 'Walk-in')} · ${escHtml(j.location || 'No location')}
                        </div>
                        <div style="font-size:0.8rem;color:var(--text-tertiary);margin-top:2px;">${timeAgo(j.createdAt)}</div>
                    </div>
                    <div style="text-align:right;">
                        <div style="font-weight:700;font-size:1.1rem;color:var(--success);">${money(j.finalPrice)}</div>
                        ${j.materialCost > 0 ? `<div style="font-size:0.75rem;color:var(--text-tertiary);">Mat: ${money(j.materialCost)}</div>` : ''}
                    </div>
                </div>`).join('');
        }

        renderList();
        document.getElementById('jobSearch')?.addEventListener('input', (e) => {
            renderList(e.target.value, document.getElementById('jobStatusFilter')?.value);
        });
        document.getElementById('jobStatusFilter')?.addEventListener('change', (e) => {
            renderList(document.getElementById('jobSearch')?.value, e.target.value);
        });
    }

    function getServiceIcon(name) {
        if (!name) return 'build';
        const svc = (APP.settings?.services || []).find(s => s.name === name);
        if (svc?.icon) return svc.icon;
        // Fallback: search all business type templates
        for (const bt of Object.values(BUSINESS_TYPES)) {
            const found = bt.services.find(s => s.name === name);
            if (found?.icon) return found.icon;
        }
        return 'build';
    }

                    <label>Final Price ($) *</label>
                    <input type="number" id="jfFinal" value="${j.finalPrice || ''}" min="0" step="0.01" required style="font-size:1.2rem;font-weight:700;">
                    <div id="priceWarning" class="warning-banner" style="display:none;">
                        <span class="material-icons">warning</span>
                        <span>Price is below minimum profit target. Are you sure?</span>
                    </div>
                </div>

                <div class="price-breakdown" id="profitSummary" style="background:var(--bg-primary);margin-top:8px;">
                    <div class="price-row" style="font-weight:700;"><span>Estimated Profit</span><span id="pbProfit" style="color:var(--success);">$0.00</span></div>
                    <div class="price-row"><span>Profit Margin</span><span id="pbMargin">0%</span></div>
                </div>

                <div class="form-group" style="margin-top:16px;">
                    <label>Notes</label>
                    <textarea id="jfNotes" rows="3" placeholder="Job notes, special instructions...">${escHtml(j.notes || '')}</textarea>
                </div>

                <div style="display:flex;gap:12px;margin-top:20px;">
                    <button type="button" class="btn btn-secondary" style="flex:1;" onclick="navigateTo('jobs')">Cancel</button>

        // Setup pricing engine watchers
        const fields = ['jfService', 'jfMiles', 'jfMaterial', 'jfAdjust', 'jfEmergency', 'jfAfterHours', 'jfSunday', 'jfHeavyDuty', 'jfTireQty'];
        fields.forEach(id => {
            const el = document.getElementById(id);
            if (el) el.addEventListener('change', recalcPrice);
            if (el) el.addEventListener('input', recalcPrice);
        });
        document.getElementById('jfFinal').addEventListener('input', checkPriceWarning);

        // Service selection handler
        document.getElementById('jfService').addEventListener('change', function() {
            const opt = this.options[this.selectedIndex];
            const tireRelated = opt.dataset?.tirerelated === 'true';
            document.getElementById('tireSection').style.display = tireRelated ? 'block' : 'none';
            recalcPrice();
        });

        // Location search
        setupLocationSearch('jfLocation', 'locationSuggestions');

        // Tire size inventory match
        document.getElementById('jfTireSize')?.addEventListener('input', debounce(matchInventory, 400));

        // Init price calc
        if (isEdit) {
            const opt = document.getElementById('jfService').options[document.getElementById('jfService').selectedIndex];
            if (opt?.dataset?.tirerelated === 'true') document.getElementById('tireSection').style.display = 'block';
        }
        recalcPrice();

        // Form submission
        document.getElementById('jobForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const svc = document.getElementById('jfService').value;
            if (!svc) { showToast('Please select a service type.', 'warning'); return; }
            const loc = document.getElementById('jfLocation').value.trim();
            if (!loc) { showToast('Please enter a location.', 'warning'); return; }
            const finalPrice = Number(document.getElementById('jfFinal').value);
            if (!finalPrice && finalPrice !== 0) { showToast('Please enter a final price.', 'warning'); return; }

            // Profit protection check
            const materialCost = Number(document.getElementById('jfMaterial').value) || 0;
            const svcConfig = (APP.settings?.services || []).find(s => s.name === svc);
            const minProfit = svcConfig?.minProfit || APP.settings?.minimumProfit || 25;
            const minimumAllowed = materialCost + minProfit;
            if (finalPrice < minimumAllowed) {
                const confirmed = confirm(`Warning: Final price (${money(finalPrice)}) is below minimum profit target (${money(minimumAllowed)}).\n\nMaterial: ${money(materialCost)}\nMin Profit: ${money(minProfit)}\nMinimum Price: ${money(minimumAllowed)}\n\nProceed anyway?`);

            }

                serviceType: svc,
                customerName: document.getElementById('jfCustomer').value.trim(),
                customerPhone: document.getElementById('jfPhone').value.trim(),
                vehicleType: document.getElementById('jfVehicle').value.trim(),
                heavyDuty: document.getElementById('jfHeavyDuty').checked,
                location: loc,
                milesFromBase: Number(document.getElementById('jfMiles').value) || 0,
                source: document.getElementById('jfSource').value,
                materialCost: materialCost,
                customAdjustment: Number(document.getElementById('jfAdjust').value) || 0,
                emergencyFee: document.getElementById('jfEmergency').checked,
                afterHoursFee: document.getElementById('jfAfterHours').checked,
                sundayFee: document.getElementById('jfSunday').checked,
                finalPrice: finalPrice,
                suggestedPrice: Number(document.getElementById('pbSuggested')?.textContent?.replace(/[^0-9.-]/g, '')) || finalPrice,
                status: document.getElementById('jfStatus').value,
                notes: document.getElementById('jfNotes').value.trim(),
                tireSize: document.getElementById('jfTireSize')?.value?.trim() || '',
                tireQty: Number(document.getElementById('jfTireQty')?.value) || 0,
                updatedAt: serverTimestamp()
            };

            try {
                if (isEdit) {
                    await userRef('jobs').doc(editJob.id).update(jobData);
                    // Handle inventory deduction on completion
                    if (jobData.status === 'completed' && editJob.status !== 'completed' && jobData.tireSize) {
                        await deductInventory(jobData.tireSize, jobData.tireQty || 1);
                    }
                    showToast('Job updated!', 'success');
                } else {
                    jobData.createdAt = serverTimestamp();
                    const ref = await userRef('jobs').add(jobData);
                    // Auto-create customer if name provided
                    if (jobData.customerName) {
                        await upsertCustomer(jobData);
                    }
                    // Deduct inventory for completed tire jobs
                    if (jobData.status === 'completed' && jobData.tireSize) {
                        await deductInventory(jobData.tireSize, jobData.tireQty || 1);
                    }
                    showToast('Job created!', 'success');
                }
                navigateTo('jobs');
            } catch (err) {
                console.error('Save job error:', err);
                showToast('Error saving job.', 'error');
                btn.disabled = false;
            }
            hideLoading();
        });

    // ─── Pricing Engine ─────────────────────────────────────────────────
    function recalcPrice() {
        const svcEl = document.getElementById('jfService');
        if (!svcEl) return;
        const opt = svcEl.options[svcEl.selectedIndex];
        const basePrice = Number(opt?.dataset?.base) || 0;
        const minProfit = Number(opt?.dataset?.minprofit) || APP.settings?.minimumProfit || 25;
        const miles = Number(document.getElementById('jfMiles')?.value) || 0;
        const freeMiles = APP.settings?.freeMiles || 10;
        const perMileRate = APP.settings?.perMileRate || 3;
        const materialCost = Number(document.getElementById('jfMaterial')?.value) || 0;
        const adjust = Number(document.getElementById('jfAdjust')?.value) || 0;
        const isHeavy = document.getElementById('jfHeavyDuty')?.checked;
        const heavyMult = isHeavy ? (APP.settings?.heavyDutyMultiplier || 1.5) : 1;

        const travelCharge = Math.max(0, miles - freeMiles) * perMileRate;
        let fees = 0;
        if (document.getElementById('jfEmergency')?.checked) fees += APP.settings?.emergencyFee || 50;
        if (document.getElementById('jfAfterHours')?.checked) fees += APP.settings?.afterHoursFee || 35;
        if (document.getElementById('jfSunday')?.checked) fees += APP.settings?.sundayFee || 25;

        const rawPrice = (basePrice * heavyMult) + travelCharge + adjust + fees;
        const minimumAllowed = materialCost + minProfit;
        const suggestedPrice = Math.max(rawPrice, minimumAllowed);

        // Update UI
        document.getElementById('pbBase').textContent = money(basePrice * heavyMult);
        document.getElementById('pbTravel').textContent = money(travelCharge);
        document.getElementById('pbFees').textContent = money(fees);
        document.getElementById('pbFeesRow').style.display = fees > 0 ? 'flex' : 'none';
        document.getElementById('pbAdjust').textContent = (adjust >= 0 ? '+' : '') + money(adjust);
        document.getElementById('pbAdjustRow').style.display = adjust !== 0 ? 'flex' : 'none';
        document.getElementById('pbMaterial').textContent = money(materialCost);
        document.getElementById('pbMinProfit').textContent = money(minProfit);
        document.getElementById('pbSuggested').textContent = money(suggestedPrice);

        // Auto-fill final price if empty or matches previous suggested
        const finalEl = document.getElementById('jfFinal');
        if (!finalEl.value || finalEl.dataset.autoFilled === 'true') {
            finalEl.value = suggestedPrice.toFixed(2);
            finalEl.dataset.autoFilled = 'true';
        }
        finalEl.addEventListener('input', () => { finalEl.dataset.autoFilled = 'false'; }, { once: true });

        checkPriceWarning();
    }

    function checkPriceWarning() {
        const finalPrice = Number(document.getElementById('jfFinal')?.value) || 0;
        const materialCost = Number(document.getElementById('jfMaterial')?.value) || 0;
        const svcEl = document.getElementById('jfService');
        const opt = svcEl?.options[svcEl.selectedIndex];
        const minProfit = Number(opt?.dataset?.minprofit) || APP.settings?.minimumProfit || 25;
        const minimumAllowed = materialCost + minProfit;
        const profit = finalPrice - materialCost;
        const margin = finalPrice > 0 ? (profit / finalPrice) * 100 : 0;

        const warn = document.getElementById('priceWarning');
        if (warn) warn.style.display = finalPrice < minimumAllowed && finalPrice > 0 ? 'flex' : 'none';

        const profitEl = document.getElementById('pbProfit');
        const marginEl = document.getElementById('pbMargin');
        if (profitEl) {
            profitEl.textContent = money(profit);
            profitEl.style.color = profit >= minProfit ? 'var(--success)' : 'var(--danger)';
        }
        if (marginEl) {
            marginEl.textContent = pct(margin);
            marginEl.style.color = margin >= 20 ? 'var(--success)' : margin >= 10 ? 'var(--warning)' : 'var(--danger)';
        }
    }

    // ─── Location Search ────────────────────────────────────────────────
    function setupLocationSearch(inputId, suggestionsId) {
        const input = document.getElementById(inputId);
        const dropdown = document.getElementById(suggestionsId);
        if (!input || !dropdown) return;

        // Load recent/frequent locations
        const areas = APP.settings?.serviceAreas || [];
        const base = APP.settings?.baseLocation || '';
        const suggestions = [...new Set([base, ...areas].filter(Boolean))];

        let selectedIdx = -1;

        input.addEventListener('focus', () => {
            if (suggestions.length > 0 && !input.value) {
                showSuggestions(suggestions);
            }
        });

        input.addEventListener('input', () => {
            const val = input.value.toLowerCase();
            if (!val) { dropdown.style.display = 'none'; return; }
            // Load saved locations from jobs cache for suggestions
            loadLocationHistory().then(locs => {
                const all = [...new Set([...suggestions, ...locs])];
                const filtered = all.filter(l => l.toLowerCase().includes(val));
                if (filtered.length > 0) showSuggestions(filtered);
                else dropdown.style.display = 'none';
            });
        });

        input.addEventListener('keydown', (e) => {
            const items = dropdown.querySelectorAll('.suggestion-item');
            if (e.key === 'ArrowDown') { e.preventDefault(); selectedIdx = Math.min(selectedIdx + 1, items.length - 1); highlightSuggestion(items); }
            if (e.key === 'ArrowUp') { e.preventDefault(); selectedIdx = Math.max(selectedIdx - 1, -1); highlightSuggestion(items); }
            if (e.key === 'Enter' && selectedIdx >= 0 && items[selectedIdx]) {
                e.preventDefault(); input.value = items[selectedIdx].textContent; dropdown.style.display = 'none'; selectedIdx = -1;
            }
            if (e.key === 'Escape') { dropdown.style.display = 'none'; selectedIdx = -1; }
        });

        document.addEventListener('click', (e) => { if (!e.target.closest(`#${inputId}`) && !e.target.closest(`#${suggestionsId}`)) dropdown.style.display = 'none'; });

        function showSuggestions(items) {
            selectedIdx = -1;
            dropdown.innerHTML = items.slice(0, 10).map(item => `<div class="suggestion-item">${escHtml(item)}</div>`).join('');
            dropdown.style.display = 'block';
            dropdown.querySelectorAll('.suggestion-item').forEach(el => {
                el.addEventListener('click', () => { input.value = el.textContent; dropdown.style.display = 'none'; });
            });
        }

        function highlightSuggestion(items) {
            items.forEach((el, i) => el.classList.toggle('active', i === selectedIdx));
        }
    }

    async function loadLocationHistory() {
        try {
            const snap = await userRef('jobs').orderBy('createdAt', 'desc').limit(50).get();
            return [...new Set(snap.docs.map(d => d.data().location).filter(Boolean))];
        } catch { return []; }
    }

    // ─── Inventory Match ────────────────────────────────────────────────
    async function matchInventory() {
        const size = normalizeTireSize(document.getElementById('jfTireSize')?.value || '');
        if (!size) { document.getElementById('inventoryMatch').style.display = 'none'; return; }
        try {
            const snap = await userRef('inventory').get();
            const matches = snap.docs.map(d => ({ id: d.id, ...d.data() }))
                .filter(i => normalizeTireSize(i.tireSize) === size && (Number(i.quantity) || 0) > 0);
            const el = document.getElementById('inventoryMatch');
            if (matches.length > 0) {
                el.style.display = 'block';
                el.innerHTML = `<div style="font-size:0.85rem;color:var(--accent);margin-bottom:8px;"><span class="material-icons" style="font-size:16px;vertical-align:middle;">check_circle</span> ${matches.length} matching tire(s) in stock</div>` +
                    matches.map(m => `<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:0.85rem;"><span>${escHtml(m.brand || '')} ${escHtml(m.model || '')} (${escHtml(m.tireSize)})</span><span>Qty: ${m.quantity} · ${money(m.cost)}/ea</span></div>`).join('');
            } else {
                el.style.display = 'block';
                el.innerHTML = `<div style="font-size:0.85rem;color:var(--warning);"><span class="material-icons" style="font-size:16px;vertical-align:middle;">warning</span> No matching tires in stock for size ${escHtml(size)}</div>`;
            }
        } catch { /* ignore */ }
    }

    function normalizeTireSize(s) {
        if (!s) return '';
        return s.replace(/\s+/g, '').replace(/[xX]/g, '/').replace(/[rR]/g, 'R').toUpperCase();
    }

    // ─── Inventory Deduction ────────────────────────────────────────────
    async function deductInventory(tireSize, qty) {
        const normalized = normalizeTireSize(tireSize);
        if (!normalized || qty <= 0) return;
        try {
            const snap = await userRef('inventory').get();
            const matches = snap.docs.map(d => ({ id: d.id, ...d.data() }))
                .filter(i => normalizeTireSize(i.tireSize) === normalized && (Number(i.quantity) || 0) > 0)
                .sort((a, b) => (Number(a.quantity) || 0) - (Number(b.quantity) || 0));
            let remaining = qty;
            for (const item of matches) {
                if (remaining <= 0) break;
                const available = Number(item.quantity) || 0;
                const deduct = Math.min(remaining, available);
                await userRef('inventory').doc(item.id).update({
                    quantity: available - deduct,
                    updatedAt: serverTimestamp()
                });
                remaining -= deduct;
            }
            if (remaining > 0) {
                showToast(`Inventory shortfall: ${remaining} tire(s) not in stock for ${tireSize}`, 'warning');
            } else {
                showToast(`Deducted ${qty} tire(s) from inventory.`, 'info');
            }
        } catch (err) {
            console.error('Inventory deduction error:', err);
        }
    }

    // ─── Customer Upsert ────────────────────────────────────────────────
    async function upsertCustomer(jobData) {
        if (!jobData.customerName) return;
        try {
            const snap = await userRef('customers').where('phone', '==', jobData.customerPhone || '').limit(1).get();
            if (!snap.empty) {
                const doc = snap.docs[0];
                await userRef('customers').doc(doc.id).update({
                    lastServiceDate: serverTimestamp(),
                    updatedAt: serverTimestamp()
                });
            } else {
                await userRef('customers').add({
                    name: jobData.customerName,
                    phone: jobData.customerPhone || '',
                    email: '',
                    source: jobData.source || 'direct',
                    notes: '',
                    lastServiceDate: serverTimestamp(),
                    createdAt: serverTimestamp(),
                    updatedAt: serverTimestamp()
                });
            }
        } catch (err) { console.error('Customer upsert error:', err); }
    }

        const currentType = APP.settings?.businessType || 'mobile_tire';
        const typeOptions = Object.entries(BUSINESS_TYPES).map(([key, bt]) =>

    async function applyTemplate() {
        const type = document.getElementById('templateType')?.value;
        const bt = BUSINESS_TYPES[type];
        if (!bt) return;
        const services = bt.services.map((s, i) => ({ id: 's' + (i + 1), ...s, enabled: true }));
        try {
            await settingsRef().update({ services, businessType: type });
            APP.settings.services = services;

            closeModal();
            renderServices();
            showToast(`Loaded ${bt.label} template with ${services.length} services!`, 'success');

    // ─── INVENTORY ──────────────────────────────────────────────────────
    async function renderInventory() {
        const main = document.getElementById('mainContent');
        main.innerHTML = `
        <div class="view-container">
            <div class="view-header">
                <h2>Inventory</h2>
                <div style="display:flex;gap:8px;">
                    <button class="btn btn-sm btn-secondary" onclick="bulkImportInventory()"><span class="material-icons">upload</span> Import</button>
                    <button class="btn btn-sm btn-primary" onclick="showAddInventory()"><span class="material-icons">add</span> Add</button>
                </div>
            </div>
            <input type="text" id="invSearch" class="search-input" placeholder="Search by size, brand, model..." style="margin-bottom:12px;">
            <div id="rimChips" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;"></div>
            <div id="invList"><div style="text-align:center;padding:40px;"><div class="spinner"></div></div></div>
        </div>`;

        const snap = await userRef('inventory').orderBy('tireSize').get();
        const items = snap.docs.map(d => ({ id: d.id, ...d.data() }));
        APP.cache.inventory = items;

        // Rim size chips
        const rimSizes = [...new Set(items.map(i => {
            const m = (i.tireSize || '').match(/R(\d+)/i);
            return m ? m[1] : null;
        }).filter(Boolean))].sort((a, b) => Number(a) - Number(b));

        const chipsEl = document.getElementById('rimChips');
        chipsEl.innerHTML = `<span class="chip active" data-rim="">All</span>` + rimSizes.map(r => `<span class="chip" data-rim="${r}">R${r}</span>`).join('');

        let activeRim = '';
        chipsEl.querySelectorAll('.chip').forEach(c => {
            c.addEventListener('click', () => {
                chipsEl.querySelectorAll('.chip').forEach(x => x.classList.remove('active'));
                c.classList.add('active');
                activeRim = c.dataset.rim;
                renderInvList(document.getElementById('invSearch')?.value, activeRim);
            });
        });

        function renderInvList(search = '', rim = '') {
            const f = search.toLowerCase();
            const filtered = items.filter(i => {
                if (rim) {
                    const m = (i.tireSize || '').match(/R(\d+)/i);
                    if (!m || m[1] !== rim) return false;
                }
                if (f) {
                    const searchable = `${i.tireSize} ${i.brand} ${i.model} ${i.category} ${i.notes}`.toLowerCase();
                    return searchable.includes(f);
                }
                return true;
            });
            const el = document.getElementById('invList');
            if (!el) return;
            if (filtered.length === 0) {
                el.innerHTML = '<div class="empty-state"><span class="material-icons" style="font-size:48px;color:var(--text-tertiary);">inventory_2</span><p>No inventory items found</p></div>';
                return;
            }
            el.innerHTML = filtered.map(i => {
                const isLow = (Number(i.quantity) || 0) <= (Number(i.lowStockThreshold) || 3);
                return `
                <div class="card list-item" style="margin-bottom:10px;cursor:pointer;" onclick="viewInventoryItem('${i.id}')">
                    <div style="flex:1;">
                        <div style="display:flex;align-items:center;gap:8px;">
                            <span style="font-weight:700;color:var(--accent);">${escHtml(i.tireSize || 'N/A')}</span>
                            ${i.condition === 'used' ? '<span class="badge badge-warning" style="font-size:0.65rem;">Used</span>' : ''}
                            ${isLow ? '<span class="badge badge-danger" style="font-size:0.65rem;">Low Stock</span>' : ''}
                        </div>
                        <div style="font-size:0.85rem;color:var(--text-secondary);">${escHtml(i.brand || '')} ${escHtml(i.model || '')}</div>
                    </div>
                    <div style="text-align:right;">
                        <div style="font-weight:600;">Qty: <span style="color:${isLow ? 'var(--danger)' : 'var(--text-primary)'};">${i.quantity || 0}</span></div>
                        <div style="font-size:0.8rem;color:var(--text-tertiary);">Cost: ${money(i.cost)} · Sell: ${money(i.sellPrice)}</div>
                    </div>
                </div>`;
            }).join('');
        }

        renderInvList();
        document.getElementById('invSearch')?.addEventListener('input', (e) => renderInvList(e.target.value, activeRim));
    }

    async function processBulkImport() {
        const raw = document.getElementById('bulkData')?.value?.trim();
        if (!raw) { showToast('No data to import.', 'warning'); return; }
        const lines = raw.split('\n').filter(l => l.trim());
        let count = 0;

        for (const line of lines) {

            await userRef('inventory').add({
                tireSize: parts[0] || '', brand: parts[1] || '', model: parts[2] || '',
                quantity: Number(parts[3]) || 0, cost: Number(parts[4]) || 0, sellPrice: Number(parts[5]) || 0,
                condition: 'new', lowStockThreshold: 3, category: '', notes: 'Bulk import',
                createdAt: serverTimestamp(), updatedAt: serverTimestamp()
            });
            count++;
        }
        hideLoading();
        closeModal();
        showToast(`Imported ${count} items!`, 'success');
        renderInventory();
    }

    function calcQuickQuote() {
        const svcEl = document.getElementById('qqService');
        if (!svcEl) return;
        const opt = svcEl.options[svcEl.selectedIndex];
        const basePrice = Number(opt?.dataset?.base) || 0;
        const minProfit = Number(opt?.dataset?.minprofit) || 25;
        const miles = Number(document.getElementById('qqMiles')?.value) || 0;
        const material = Number(document.getElementById('qqMaterial')?.value) || 0;
        const heavy = document.getElementById('qqHeavy')?.checked;
        const heavyMult = heavy ? (APP.settings?.heavyDutyMultiplier || 1.5) : 1;
        const freeMiles = APP.settings?.freeMiles || 10;
        const perMile = APP.settings?.perMileRate || 3;

        const travel = Math.max(0, miles - freeMiles) * perMile;
        let fees = 0;
        if (document.getElementById('qqEmergency')?.checked) fees += APP.settings?.emergencyFee || 50;
        if (document.getElementById('qqAfterHours')?.checked) fees += APP.settings?.afterHoursFee || 35;

        const raw = (basePrice * heavyMult) + travel + fees;
        const minAllowed = material + minProfit;
        const suggested = Math.max(raw, minAllowed);
        const profit = suggested - material;

        APP.cache.lastQuote = { serviceType: svcEl.value, miles, material, heavy, suggested, basePrice, travel, fees, profit };

        document.getElementById('qqResult').innerHTML = `
            <div class="price-row"><span>Base Price</span><span>${money(basePrice * heavyMult)}</span></div>
            <div class="price-row"><span>Travel</span><span>${money(travel)}</span></div>
            ${fees > 0 ? `<div class="price-row"><span>Fees</span><span>${money(fees)}</span></div>` : ''}
            <div class="price-row"><span>Materials</span><span>${money(material)}</span></div>
            <div class="price-row" style="font-weight:700;font-size:1.1rem;border-top:1px solid var(--border);padding-top:8px;">
                <span>Quote Price</span><span style="color:var(--accent);">${money(suggested)}</span>
            </div>
            <div class="price-row"><span>Est. Profit</span><span style="color:var(--success);">${money(profit)}</span></div>`;
    }

    async function saveQuote() {
        const q = APP.cache.lastQuote;
        if (!q) { calcQuickQuote(); }
        const data = {
            serviceType: q?.serviceType || document.getElementById('qqService')?.value,
            customerName: '',
            suggestedPrice: q?.suggested || 0,
            materialCost: q?.material || 0,
            miles: q?.miles || 0,
            status: 'pending',
            notes: '',
            createdAt: serverTimestamp()
        };
        try {
            await userRef('quotes').add(data);
            showToast('Quote saved!', 'success');
            renderQuotes();
        } catch { showToast('Error saving quote.', 'error'); }
    }
